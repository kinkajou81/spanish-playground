<html>
    <head>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="main_screen">
            <p id="main_title">Spanish Playground</p> <!-- 18 chars -->
            <button class="games_buttons better_button" style="top: 56.1vh; left:8.2vw" onclick="palabrita()">
                <p class="games_text">Palabrita</p>
            </button>
            <button class="games_buttons better_button" style="top: 56.1vh; left:36.8vw">
                <p class="games_text">Conexiónes</p>
            </button>
            <button class="games_buttons better_button" style="top: 56.1vh; left:65.4vw">
                <p class="games_text">Hilos</p>
            </button>
        </div>

        <div id="palabrita">
            <button id="back_button" class="better_button" onclick="back_palabrita()">
                <
            </button>
            <p id="palabrita_text1">Palabrita</p>
            <p id="palabrita_text2">Get 6 chances to guess a 5-letter word</p>
            <button id="palabrita_play" class="better_button" onclick="palabrita_play()">
                <p id="palabrita_text_play">
                    Play
                </p>
            </div>
        </div>

        <div id="palabrita_game">
            <button id="back_button" class="better_button" onclick="back_palabrita_play()">
                <
            </button>

            <button id="key_q" class="keyboard_button better_button" style="top: 66.6vh; left: calc(50vw + -4 * (var(--key-width) + 1vh) - var(--key-width) / 2 - 0.5vh);" onclick="pal_key('q')">
                <p class="keyboard_text">
                    Q
                </p>
            </button>

            <button id="key_w" class="keyboard_button better_button" style="top: 66.6vh; left: calc(50vw + -3 * (var(--key-width) + 1vh) - var(--key-width) / 2 - 0.5vh);" onclick="pal_key('w')">
                <p class="keyboard_text">
                    W
                </p>
            </button>

            <button id="key_e" class="keyboard_button better_button" style="top: 66.6vh; left: calc(50vw + -2 * (var(--key-width) + 1vh) - var(--key-width) / 2 - 0.5vh);" onclick="pal_key('e')">
                <p class="keyboard_text">
                    E
                </p>
            </button>

            <button id="key_r" class="keyboard_button better_button" style="top: 66.6vh; left: calc(50vw + -1 * (var(--key-width) + 1vh) - var(--key-width) / 2 - 0.5vh);" onclick="pal_key('r')">
                <p class="keyboard_text">
                    R
                </p>
            </button>
            
            <button id="key_t" class="keyboard_button better_button" style="top: 66.6vh; left: calc(50vw - var(--key-width) / 2 - 0.5vh);" onclick="pal_key('t')">
                <p class="keyboard_text">
                    T
                </p>
            </button>

            <button id="key_y" class="keyboard_button better_button" style="top: 66.6vh; left: calc(50vw + var(--key-width) / 2 + 0.5vh);" onclick="pal_key('y')">
                <p class="keyboard_text">
                    Y
                </p>
            </button>

            <button id="key_u" class="keyboard_button better_button" style="top: 66.6vh; left: calc(50vw + 1 * (var(--key-width) + 1vh) + var(--key-width) / 2 + 0.5vh);" onclick="pal_key('u')">
                <p class="keyboard_text">
                    U
                </p>
            </button>

            <button id="key_i" class="keyboard_button better_button" style="top: 66.6vh; left: calc(50vw + 2 * (var(--key-width) + 1vh) + var(--key-width) / 2 + 0.5vh);" onclick="pal_key('i')">
                <p class="keyboard_text">
                    I
                </p>
            </button>

            <button id="key_o" class="keyboard_button better_button" style="top: 66.6vh; left: calc(50vw + 3 * (var(--key-width) + 1vh) + var(--key-width) / 2 + 0.5vh);" onclick="pal_key('o')">
                <p class="keyboard_text">
                    O
                </p>
            </button>

            <button id="key_p" class="keyboard_button better_button" style="top: 66.6vh; left: calc(50vw + 4 * (var(--key-width) + 1vh) + var(--key-width) / 2 + 0.5vh);" onclick="pal_key('p')">
                <p class="keyboard_text">
                    P
                </p>
            </button>

            <button id="key_del" class="keyboard_button_big better_button" style="top: 66.6vh; left: calc(50vw + 4 * (var(--key-width) + 1vh) + var(--key-width) / 2 + 0.5vh + var(--big-key-width));" onclick="pal_key('del')">
                <p class="keyboard_text">
                    ⌫
                </p>
            </button>

            <button id="key_a" class="keyboard_button better_button" style="top: 75.72vh; left: calc(50vw + -4 * (var(--key-width) + 1vh));" onclick="pal_key('a')">
                <p class="keyboard_text">
                    A
                </p>
            </button>

            <button id="key_s" class="keyboard_button better_button" style="top: 75.72vh; left: calc(50vw + -3 * (var(--key-width) + 1vh));" onclick="pal_key('s')">
                <p class="keyboard_text">
                    S
                </p>
            </button>

            <button id="key_d" class="keyboard_button better_button" style="top: 75.72vh; left: calc(50vw + -2 * (var(--key-width) + 1vh));" onclick="pal_key('d')">
                <p class="keyboard_text">
                    D
                </p>
            </button>

            <button id="key_f" class="keyboard_button better_button" style="top: 75.72vh; left: calc(50vw + -1 * (var(--key-width) + 1vh));" onclick="pal_key('f')">
                <p class="keyboard_text">
                    F
                </p>
            </button>

            <button id="key_g" class="keyboard_button better_button" style="top: 75.72vh; left: 50vw;" onclick="pal_key('g')">
                <p class="keyboard_text">
                    G
                </p>
            </button>
            
            <button id="key_h" class="keyboard_button better_button" style="top: 75.72vh; left: calc(50vw + 1 * (var(--key-width) + 1vh));" onclick="pal_key('h')">
                <p class="keyboard_text">
                    H
                </p>
            </button>

            <button id="key_j" class="keyboard_button better_button" style="top: 75.72vh; left: calc(50vw + 2 * (var(--key-width) + 1vh));" onclick="pal_key('j')">
                <p class="keyboard_text">
                    J
                </p>
            </button>

            <button id="key_k" class="keyboard_button better_button" style="top: 75.72vh; left: calc(50vw + 3 * (var(--key-width) + 1vh));" onclick="pal_key('k')">
                <p class="keyboard_text">
                    K
                </p>
            </button>

            <button id="key_l" class="keyboard_button better_button" style="top: 75.72vh; left: calc(50vw + 4 * (var(--key-width) + 1vh));" onclick="pal_key('l')">
                <p class="keyboard_text">
                    L
                </p>
            </button>

            <button id="key_enter" class="keyboard_button_big better_button" style="top: 75.72vh; left: calc(50vw + 4 * (var(--key-width) + 1vh) + var(--big-key-width));" onclick="pal_key('enter')">
                <p class="keyboard_enter">
                    ENTER
                </p>
            </button>

            <button id="key_z" class="keyboard_button better_button" style="top: 84.84vh; left: calc(50vw + -4 * (var(--key-width) + 1vh));" onclick="pal_key('z')">
                <p class="keyboard_text">
                    ẍ
                </p>
            </button>

            <button id="key_z" class="keyboard_button better_button" style="top: 84.84vh; left: calc(50vw + -3 * (var(--key-width) + 1vh));" onclick="pal_key('z')">
                <p class="keyboard_text">
                    Z
                </p>
            </button>

            <button id="key_x" class="keyboard_button better_button" style="top: 84.84vh; left: calc(50vw + -2 * (var(--key-width) + 1vh));" onclick="pal_key('x')">
                <p class="keyboard_text">
                    X
                </p>
            </button>

            <button id="key_c" class="keyboard_button better_button" style="top: 84.84vh; left: calc(50vw + -1 * (var(--key-width) + 1vh));" onclick="pal_key('c')">
                <p class="keyboard_text">
                    C
                </p>
            </button>

            <button id="key_v" class="keyboard_button better_button" style="top: 84.84vh; left: 50vw;" onclick="pal_key('v')">
                <p class="keyboard_text">
                    V
                </p>
            </button>
            
            <button id="key_b" class="keyboard_button better_button" style="top: 84.84vh; left: calc(50vw + 1 * (var(--key-width) + 1vh));" onclick="pal_key('b')">
                <p class="keyboard_text">
                    B
                </p>
            </button>

            <button id="key_n" class="keyboard_button better_button" style="top: 84.84vh; left: calc(50vw + 2 * (var(--key-width) + 1vh));" onclick="pal_key('n')">
                <p class="keyboard_text">
                    N
                </p>
            </button>

            <button id="key_m" class="keyboard_button better_button" style="top: 84.84vh; left: calc(50vw + 3 * (var(--key-width) + 1vh));" onclick="pal_key('m')">
                <p class="keyboard_text">
                    M
                </p>
            </button>

            <button id="key_m" class="keyboard_button better_button" style="top: 84.84vh; left: calc(50vw + 4 * (var(--key-width) + 1vh));" onclick="pal_key('m')">
                <p class="keyboard_text">
                    x̃
                </p>
            </button>

            <button id="key_m" class="keyboard_button better_button" style="top: 84.84vh; left: calc(50vw + 5 * (var(--key-width) + 1vh));" onclick="pal_key('m')">
                <p class="keyboard_text">
                    x́
                </p>
            </button>

            <div id="pal_word_display">
                <div id="word_display_" class="word_display_box">
                    <p id="word_display_box_" class="word_display_text"></p>
                </div>
            </div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
